# Cap container logs so an unattended box can't slowly fill its disk - Docker's
# default json-file driver never rotates. 10 MB x 5 = 50 MB. (Mirrors PingCanvas.)
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  snmpcanvas:
    build: .
    image: snmpcanvas
    container_name: snmpcanvas
    # Default port 9161 ("161" for SNMP) - stays clear of UptimeKuma (3001)
    # and CrossCanvas/PingCanvas (8080/8443) on a shared docker host.
    ports:
      - "9161:9161"
    volumes:
      # Everything persistent lives here ON THE HOST: the SQLite database,
      # TLS certs (data/certs/), and snmp-status.json - so a dashboard
      # container on the same host can read ./data/snmp-status.json directly,
      # or you can bind a second volume and point Settings → export path at it.
      # Create it writable by the container user first:
      #   mkdir -p data && sudo chown 1000:1000 data
      # The :z suffix labels the mount for SELinux hosts (RHEL/Rocky/Fedora);
      # it's a no-op elsewhere.
      - ./data:/data:z
    # Make the DOCKER HOST reachable from inside the container by name -
    # for when the box running the containers is itself a monitored device
    # (its own snmpd). Add it with host "host.docker.internal" instead of a
    # bridge IP that can change. Note the polls arrive FROM the docker bridge
    # subnet (172.x), so an agent restricted by source network (snmpd
    # agentaddress/com2sec, firewalld) must also allow 172.16.0.0/12.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Timezone governs the nightly prune schedule and log timestamps
      - TZ=Etc/UTC
      # Optional: pre-set the admin password (otherwise the UI offers a
      # first-run setup page)
      #- ADMIN_PASSWORD=change-me
      # Optional: encrypt stored SNMP credentials at rest with this secret
      #- SNMPCANVAS_SECRET=a-long-random-string
      #- POLL_CONCURRENCY=4
    logging: *default-logging
    restart: unless-stopped

# HTTPS: run  ./tools/gen-cert.sh <hostname-or-ip>  once on the host (or drop
# your own PEM pair at data/certs/server.crt + server.key), then
# `docker compose restart`. The server switches to HTTPS automatically.
